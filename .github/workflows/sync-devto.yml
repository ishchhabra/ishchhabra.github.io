name: Sync articles to Dev.to

on:
  push:
    branches: [main]
    paths:
      - "apps/portfolio/src/pages/writing/**"
      - "apps/portfolio/src/lib/articles.ts"
      - "apps/portfolio/src/lib/article-renderer.tsx"
      - "apps/portfolio/src/lib/article-markdown.ts"
      - "apps/portfolio/src/components/writing/**"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: package.json
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Sync to Dev.to
        run: pnpm --filter portfolio sync-to-devto
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          VITE_SITE_URL: "https://ishchhabra.com"
